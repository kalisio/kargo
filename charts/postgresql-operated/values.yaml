# Default values for postgresql-operated Chart
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# nameOverride allow user to override chart name
nameOverride: ""

image:
  # registry defines the prefix of the container image
  # it could be overriden to use internal repository
  registry: "ghcr.io/cloudnative-pg"
  # name define the suffix of the container image
  # possible names: postgresql, postgis
  # https://github.com/cloudnative-pg/postgres-containers/pkgs/container/postgresql/versions?filters%5Bversion_type%5D=tagged
  # https://github.com/cloudnative-pg/postgis-containers/pkgs/container/postgis/versions?filters%5Bversion_type%5D=tagged
  name: postgresql
  # version defines the tag of the images
  # version: 13-3.6-system-trixie
  version: 17-system-trixie
  # This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
  pullSecrets: []
  # pullPolicy allow to always download or not the container image
  pullPolicy: IfNotPresent

# number of replicas in the replicaset of postgresql
replicaCount: 1

# pod annotations
podAnnotations: {}

# bootstrap section default configuration will create one database called app
# and generate automatically user / password
# see reference https://cloudnative-pg.io/docs/1.28/bootstrap#the-bootstrap-section
#
# bootstrap:
#   initdb:
#     database: mymap
#     owner: map-user
#     secret:
#       name: map-user-secret
bootstrap:
  initdb:
    database: app
    owner: app

# postgresql section allows to provide custom parameters in the postgresql configuration
# it's injected at the end of the postgresql.conf generated by the operator
# with "include 'custom.conf'"
#
# postgresql:
#   parameters:
#     shared_buffers: "1GB"
#   pg_hba:
#     - hostssl app app 10.244.0.0/16 md5
postgresql: {}

# superuserSecretName allow to specify the super user password
# instead of a generated one
# this must be the name of a secret with two keys user and password
superuserSecretName: ""

# storage section
# see reference https://cloudnative-pg.io/docs/1.28/storage
#
# storage:
#   storageClass: csi-cinder-high-speed
#   size: 10Gi
storage:
  size: 1Gi

# affinities can be used to schedule one replica per node
# https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity
#
# affinity:
#   podAntiAffinity:
#     preferredDuringSchedulingIgnoredDuringExecution:
#     - weigth: 100
#       podAffinityTerm:
#       labelSelector:
#         matchExpressions:
#         - key: app
#           operator: In
#           values:
#           - appsdb-mongodb-operated-svc
#         topologyKey: "kubernetes.io/hostname"

affinity: {}

# resources section to define limits and requests
# https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
#
# resources:
#   limits:
#     cpu: "2"
#     memory: 2Gi
#   requests:
#     cpu: 100m
#     memory: 200Mi

resources: {}
