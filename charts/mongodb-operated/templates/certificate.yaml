{{- if .Values.security.tls.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.security.tls.certName | default "mongodb-external-cert" }}
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ .Values.security.tls.secretName | default "mongodb-tls-secret" }}
  issuerRef:
    name: {{ .Values.security.tls.issuerName | default "mongodb-ca-issuer" }}
    kind: Issuer
  dnsNames:
    {{- range .Values.security.tls.dnsNames }}
    - {{ . | quote }}
    {{- end }}
{{- end }}